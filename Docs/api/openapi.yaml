openapi: 3.0.0
info:
  title: Connect Africa Identity API
  version: 1.0.0
  description: Authentication and Identity management
paths:
  /api/v1/auth/login:
    post:
      summary: Login user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
  /api/v1/auth/register:
    post:
      summary: Register new user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
  /api/v1/auth/logout:
    post:
      summary: Logout user
      responses:
        '204':
          description: Logout successful
  /api/v1/auth/refresh:
    post:
      summary: Refresh token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: Token refreshed
  /api/v1/auth/reset-password:
    post:
      summary: Reset password
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                newPassword: { type: string, minLength: 8 }
      responses:
        '200':
          description: Password reset successful
  /api/v1/auth/verify-email:
    post:
      summary: Verify email
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                userId: { type: string, format: uuid }
      responses:
        '200':
          description: Email verified successfully
  /api/v1/auth/update-profile:
    patch:
      summary: Update profile
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName: { type: string }
      responses:
        '200':
          description: Profile updated
  /api/v1/auth/ban-user:
    post:
      summary: Ban user
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                userIdToBan: { type: string, format: uuid }
      responses:
        '200':
          description: User banned
  /api/v1/ontology:
    post:
      summary: Create a new ontology
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOntologyRequest'
      responses:
        '201':
          description: Ontology created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OntologyResponse'
    get:
      summary: List ontologies
      parameters:
        - name: limit
          in: query
          schema: { type: integer }
        - name: offset
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: List of ontologies
  /api/v1/ontology/{id}:
    get:
      summary: Get ontology by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Ontology details
  /api/v1/ontology/{id}/publish:
    post:
      summary: Publish an ontology
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Ontology published successfully
  /api/v1/ontology/{id}/entity-types:
    post:
      summary: Create an entity type
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        '201':
          description: Entity type created successfully
components:
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
    CreateOntologyRequest:
      type: object
      required: [name, description, version]
      properties:
        name: { type: string }
        description: { type: string }
        version: { type: integer }
    OntologyResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        version: { type: integer }

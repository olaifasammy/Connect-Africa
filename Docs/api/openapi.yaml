openapi: 3.0.0
info:
  title: Connect Africa Identity API
  version: 1.0.0
  description: Authentication and Identity management
paths:
  /api/v1/auth/login:
    post:
      summary: Login user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
  /api/v1/ontology:
    post:
      summary: Create a new ontology
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOntologyRequest'
      responses:
        '201':
          description: Ontology created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OntologyResponse'
    get:
      summary: List ontologies
      parameters:
        - name: limit
          in: query
          schema: { type: integer }
        - name: offset
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: List of ontologies
  /api/v1/ontology/{id}:
    get:
      summary: Get ontology by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Ontology details
  /api/v1/ontology/{id}/publish:
    post:
      summary: Publish an ontology
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Ontology published successfully
  /api/v1/ontology/{id}/entity-types:
    post:
      summary: Create an entity type
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        '201':
          description: Entity type created successfully
components:
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
    CreateOntologyRequest:
      type: object
      required: [name, description, version]
      properties:
        name: { type: string }
        description: { type: string }
        version: { type: integer }
    OntologyResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        version: { type: integer }

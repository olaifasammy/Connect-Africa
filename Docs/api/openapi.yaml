openapi: 3.0.0
info:
  title: Connect Africa Identity API
  version: 1.0.0
  description: Authentication and Identity management
paths:
  /api/v1/auth/login:
    post:
      summary: Login user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
  /api/v1/auth/register:
    post:
      summary: Register new user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
  /api/v1/auth/logout:
    post:
      summary: Logout user
      responses:
        '204':
          description: Logout successful
  /api/v1/auth/refresh:
    post:
      summary: Refresh token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: Token refreshed
  /api/v1/auth/reset-password:
    post:
      summary: Reset password
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                newPassword: { type: string, minLength: 8 }
      responses:
        '200':
          description: Password reset successful
  /api/v1/auth/verify-email:
    post:
      summary: Verify email
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                userId: { type: string, format: uuid }
      responses:
        '200':
          description: Email verified successfully
  /api/v1/auth/update-profile:
    patch:
      summary: Update profile
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName: { type: string }
      responses:
        '200':
          description: Profile updated
  /api/v1/auth/ban-user:
    post:
      summary: Ban user
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                userIdToBan: { type: string, format: uuid }
      responses:
        '200':
          description: User banned
  /api/v1/ontology:
    post:
      summary: Create a new ontology
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOntologyRequest'
      responses:
        '201':
          description: Ontology created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OntologyResponse'
    get:
      summary: List ontologies
      parameters:
        - name: limit
          in: query
          schema: { type: integer }
        - name: offset
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: List of ontologies
  /api/v1/ontology/{id}:
    get:
      summary: Get ontology by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Ontology details
  /api/v1/ontology/{id}/publish:
    post:
      summary: Publish an ontology
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Ontology published successfully
  /api/v1/graph/nodes:
    post:
      summary: Create a new graph node
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [entityId, type]
              properties:
                entityId: { type: string, format: uuid }
                type: { type: string }
                metadata: { type: object }
      responses:
        '201':
          description: Node created successfully
  /api/v1/graph/edges:
    post:
      summary: Create a new graph edge
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [sourceEntityId, targetEntityId, relationshipType]
              properties:
                sourceEntityId: { type: string, format: uuid }
                targetEntityId: { type: string, format: uuid }
                relationshipType: { type: string }
      responses:
        '201':
          description: Edge created successfully
  /api/v1/graph/nodes/{id}:
    get:
      summary: Get node by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Node details
        '404':
          description: Node not found
  /api/v1/graph/search:
    get:
      summary: Search graph
      parameters:
        - name: label
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Search results
  /api/v1/notifications:
    post:
      summary: Send a notification
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendNotificationRequest'
      responses:
        '200':
          description: Notification sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
  /api/v1/notifications/{id}/read:
    post:
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Notification marked as read
  /api/v1/notifications/{id}/preferences:
    patch:
      summary: Update notification preferences
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled: { type: boolean }
      responses:
        '200':
          description: Preferences updated
  /api/v1/ai/process:
    post:
      summary: Process an AI request
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt: { type: string }
                provider: { type: string }
      responses:
        '200':
          description: AI request processed successfully
  /api/v1/ai/providers/{id}/health:
    get:
      summary: Get provider health
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Provider health status
  /api/v1/ai/admin/knowledge-gaps:
    post:
      summary: Record a knowledge gap
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [topic, prompt]
              properties:
                topic: { type: string }
                prompt: { type: string }
      responses:
        '200':
          description: Knowledge gap recorded
  /api/v1/ai/admin/crawl/start:
    post:
      summary: Start a crawler
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [targetUrl]
              properties:
                targetUrl: { type: string }
      responses:
        '200':
          description: Crawler started
components:
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
    CreateOntologyRequest:
      type: object
      required: [name, description, version]
      properties:
        name: { type: string }
        description: { type: string }
        version: { type: integer }
    CreateEntityRequest:
      type: object
      required: [name, type]
      properties:
        name: { type: string }
        type: { type: string }
        description: { type: string }
        source: { type: string }
        tags: { type: array, items: { type: string } }
    CreateArticleRequest:
      type: object
      required: [title, summary, content, authorId]
      properties:
        title: { type: string }
        summary: { type: string }
        content: { type: string }
        authorId: { type: string, format: uuid }
    CreateRelationshipRequest:
      type: object
      required: [sourceEntityId, targetEntityId, relationshipTypeId]
      properties:
        sourceEntityId: { type: string, format: uuid }
        targetEntityId: { type: string, format: uuid }
        relationshipTypeId: { type: string, format: uuid }
    SendNotificationRequest:
      type: object
      required: [recipientId, templateId, channel]
      properties:
        recipientId: { type: string, format: uuid }
        templateId: { type: string, format: uuid }
        channel: { type: string, enum: [IN_APP, EMAIL, PUSH] }
    NotificationResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        status: { type: string }
